spring.application.name=epistemiq-backend

# 1. PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/epistemiq_db
spring.datasource.username=epistemiq
spring.datasource.password=admin

# Hibernate configuration (Automatically creates our database tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# 2. Google Gemini API Configuration
# Google Gemini API Configuration
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.chat-model=gemini-3-flash-preview
app.gemini.embedding-model=gemini-embedding-001

# 3. Enable CORS for the future Vue frontend (running on Vite's default port 5173)
spring.mvc.cors.allowed-origins=http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# 4. Tell Spring Boot about the .env file
spring.config.import=optional:file:./.env
